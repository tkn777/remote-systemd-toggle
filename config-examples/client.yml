Server:
  address: vpn.example.org
  port: 47112 # optional, default 47112
  timeout: 5 # optional, default 5 seconds

TLS:
  cert: /home/user/.config/ovpn-unlock/client.crt
  key: /home/user/.config/ovpn-unlock/client.key
  server-ca-cert: /home/user/.config/ovpn-unlock/server-ca.crt # optional, extends system CAs
