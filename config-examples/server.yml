Server:
  listen: 0.0.0.0 # optional, default 0.0.0.0
  port: 47112 # optional, default 47112
  timeout: 5 # optional, default 5 seconds

TLS:
  cert: /etc/letsencrypt/live/vpn.example.org/fullchain.pem
  key: /etc/letsencrypt/live/vpn.example.org/privkey.pem
  client-ca-cert: /etc/ovpn-unlock/client-ca.crt
  client-cn: ovpn-unlock-client # optional, verifies the client certificate CN when set

OpenVPN:
  service: openvpn-server@intern.thk-systems.de.service # optional, default openvpn-server@intern.thk-systems.de.service
