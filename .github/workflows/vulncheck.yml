name: Vulnerability Check

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: |
            common/go.sum
            remote-systemd-toggle/go.sum
            remote-systemd-toggled/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck for common
        working-directory: common
        run: govulncheck ./...

      - name: Run govulncheck for client
        working-directory: remote-systemd-toggle
        run: govulncheck ./...

      - name: Run govulncheck for server
        working-directory: remote-systemd-toggled
        run: govulncheck ./...
